<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Analyzer</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
// simple add of a comment
// ===== RESIZE =====
function resize() {
  const height = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  canvas.width = window.innerWidth;
  canvas.height = height;
}
resize();
window.addEventListener("resize", resize);
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", resize);
}
// ===== A-WEIGHTING FUNCTION =====
function aWeighting(f) {
  const f2 = f * f;

  const ra =
    (12200 * 12200 * f2 * f2) /
    ((f2 + 20.6 * 20.6) *
     Math.sqrt((f2 + 107.7 * 107.7) * (f2 + 737.9 * 737.9)) *
     (f2 + 12200 * 12200));

  // convert to dB
  const a = 20 * Math.log10(ra) + 2;

  // convert back to linear gain
  return Math.pow(10, a / 20);
}
// ===== START AUDIO =====
async function start() {

  console.log("start called");

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;   //started at 512
  analyser.smoothingTimeConstant = 0.8;

  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  const bars = 32;
  const peakArray = new Array(bars).fill(0);

  function draw() { 
    requestAnimationFrame(draw);
    const sampleRate = 44100;
    const nyquist = sampleRate / 2;
    
    analyser.getByteFrequencyData(dataArray);

    // clear
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const baselineY = canvas.height - 30;

    // ===== BASELINE =====
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, baselineY);
    ctx.lineTo(canvas.width, baselineY);
    ctx.stroke();

    // ===== dB SCALE =====
    ctx.fillStyle = "white";
    ctx.font = "12px monospace";

    for (let db = 0; db >= -80; db -= 20) {
      const y = baselineY - ((db + 80) / 80) * (canvas.height * 0.8);

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(20, y);
      ctx.stroke();

      ctx.fillText(db + " dB", 25, y + 4);
    }

    // ===== FREQUENCY LABELS =====

    ctx.font = "10px monospace";

    const labelFreqs = [60, 250, 1000, 4000, 8000, 16000];

    for (let f of labelFreqs) {
      const logPos = Math.log10(f / 20) / Math.log10(nyquist / 20);
      const x = logPos * canvas.width;

      ctx.fillText(
        f >= 1000 ? (f / 1000) + "k" : f,
        x,
        baselineY + 15
      );
    }

    // ===== BARS =====(insert new code)
// ===== MAP FFT → LOG BARS =====
const gain = 1.0;   // try 1.0 → 5.0
const fftSize = analyser.fftSize;
const minFreq = 20;
const maxFreq = nyquist;

const barWidth = canvas.width / bars;

// storage
let barValues = new Array(bars).fill(0);
let barCounts = new Array(bars).fill(0);

// map FFT bins → bars
for (let i = 0; i < bufferLength; i++) {

  const freq = i * sampleRate / fftSize;
  if (freq < minFreq) continue;

  const logPos = Math.log10(freq / minFreq) / Math.log10(maxFreq / minFreq);
  const barIndex = Math.floor(logPos * bars);

  if (barIndex >= 0 && barIndex < bars) {
    barValues[barIndex] += dataArray[i];
    barCounts[barIndex]++;
  }
}

// ===== DRAW BARS =====
for (let i = 0; i < bars; i++) {

  let value = barCounts[i] > 0 ? barValues[i] / barCounts[i] : 0;

  // A-weighting
  const freq = minFreq * Math.pow(maxFreq / minFreq, i / bars);
  value *= aWeighting(freq);

  value = Math.max(value * gain, 1);
  let db = 20 * Math.log10(value + 1);

  // soft knee compression
  db = db / (1 + db / 60);
  const minDb = 0;
  const maxDb = 60;   // increase headroom

  db = Math.max(minDb, Math.min(maxDb, db));

  let normalized = (db - minDb) / (maxDb - minDb);
  const height = normalized * (canvas.height * 0.8);

  const x = i * barWidth;

  ctx.fillStyle = `hsl(${i / bars * 360}, 100%, 50%)`;

  ctx.fillRect(
    x,
    baselineY - height,
    barWidth - 2,
    height
  );

  // peak hold
  if (height > peakArray[i]) {
    peakArray[i] = height;
  } else {
    peakArray[i] *= 0.95;
  }

  ctx.fillStyle = "white";
  ctx.fillRect(
    x,
    baselineY - peakArray[i] - 2,
    barWidth - 2,
    3
  );
}
    
  }

  draw();
}

// ===== CLICK HANDLER (reliable on iPhone) =====
document.addEventListener("click", start, { once: true });

</script>

</body>
</html>
