<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Analyzer</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ===== RESIZE =====
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== A-WEIGHTING =====
function aWeighting(f) {
  const f2 = f * f;
  const ra =
    (12200 * 12200 * f2 * f2) /
    ((f2 + 20.6 * 20.6) *
     Math.sqrt((f2 + 107.7 * 107.7) * (f2 + 737.9 * 737.9)) *
     (f2 + 12200 * 12200));
  const a = 20 * Math.log10(ra) + 2;
  return Math.pow(10, a / 20);
}

// ===== START AUDIO =====
async function start() {

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.8;

  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Float32Array(bufferLength);

  const bars = 32;
  const peakArray = new Array(bars).fill(-90);

  const minDb = -90;
  const maxDb = -20;
  const gain = 6; // dB boost

  function draw() {
    requestAnimationFrame(draw);

    const sampleRate = audioCtx.sampleRate;
    const nyquist = sampleRate / 2;

    analyser.getFloatFrequencyData(dataArray);

    // clear
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const baselineY = canvas.height - 30;

    // ===== BASELINE =====
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, baselineY);
    ctx.lineTo(canvas.width, baselineY);
    ctx.stroke();

    // ===== dB SCALE =====
    ctx.fillStyle = "white";
    ctx.font = "12px monospace";

    for (let db = -20; db >= -90; db -= 10) {
      const y = baselineY - ((db - minDb) / (maxDb - minDb)) * (canvas.height * 0.8);

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(20, y);
      ctx.stroke();

      ctx.fillText(db + " dB", 25, y + 4);
    }

    // ===== FREQUENCY LABELS =====
    ctx.font = "10px monospace";

    const labelFreqs = [60, 250, 1000, 4000, 8000, 16000];

    for (let f of labelFreqs) {
      const logPos = Math.log10(f / 20) / Math.log10(nyquist / 20);
      const x = logPos * canvas.width;

      ctx.fillText(
        f >= 1000 ? (f / 1000) + "k" : f,
        x,
        baselineY + 15
      );
    }

    // ===== LOG BIN MAPPING (MAX method) =====
    const barValues = new Array(bars).fill(-120);

    for (let i = 0; i < bufferLength; i++) {

      const freq = i * sampleRate / analyser.fftSize;
      if (freq < 20) continue;

      const logPos = Math.log10(freq / 20) / Math.log10(nyquist / 20);
      const barIndex = Math.floor(logPos * bars);

      if (barIndex >= 0 && barIndex < bars) {
        barValues[barIndex] = Math.max(barValues[barIndex], dataArray[i]);
      }
    }

    const barWidth = canvas.width / bars;

    // ===== DRAW BARS =====
    for (let i = 0; i < bars; i++) {

      let db = barValues[i];

      // A-weighting in dB
      const freq = 20 * Math.pow(nyquist / 20, i / bars);
      const weight = aWeighting(freq);
      const weightDb = 20 * Math.log10(weight + 0.0001);

      db += weightDb * 0.5;

      // gain
      db += gain;

      // clamp
      db = Math.max(minDb, Math.min(maxDb, db));

      const normalized = (db - minDb) / (maxDb - minDb);
      const height = normalized * (canvas.height * 0.8);

      const x = i * barWidth;

      // bar
      ctx.fillStyle = `hsl(${i / bars * 360}, 100%, 50%)`;
      ctx.fillRect(x, baselineY - height, barWidth - 2, height);

      // peak hold
      if (db > peakArray[i]) {
        peakArray[i] = db;
      } else {
        peakArray[i] -= 0.5;
      }

      const peakNorm = (peakArray[i] - minDb) / (maxDb - minDb);
      const peakY = baselineY - peakNorm * (canvas.height * 0.8);

      ctx.fillStyle = "white";
      ctx.fillRect(x, peakY, barWidth - 2, 2);
    }
  }

  draw();
}

// ===== START ON CLICK =====
document.addEventListener("click", start, { once: true });

</script>

</body>
</html>
