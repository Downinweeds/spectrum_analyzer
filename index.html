<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Analyzer</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ===== MOBILE-SAFE RESIZE =====
function resize() {
  const height = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  canvas.width = window.innerWidth;
  canvas.height = height;
}
resize();
window.addEventListener("resize", resize);

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", resize);
}

// ===== START AUDIO =====
async function start() {

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.8;

  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  const minDb = -80;
  const maxDb = 0;

  const bars = 32;
  const step = Math.floor(bufferLength / bars);

  // peak hold array
  const peakArray = new Array(bars).fill(0);

  function draw() {
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    // clear screen
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ===== BASELINE =====
    const baselineY = canvas.height - 25;

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0, baselineY);
    ctx.lineTo(canvas.width, baselineY);
    ctx.stroke();

    // ===== dB SCALE =====
    ctx.fillStyle = "white";
    ctx.font = "12px monospace";

    for (let dbMark = 0; dbMark >= minDb; dbMark -= 20) {
      const normalized = (dbMark - minDb) / (maxDb - minDb);
      const y = baselineY - normalized * (canvas.height * 0.8);

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(20, y);
      ctx.stroke();

      ctx.fillText(dbMark + " dB", 25, y + 4);
    }

    // ===== DRAW BARS =====
const barWidth = canvas.width / bars;

// ===== FREQUENCY LABELS =====
ctx.fillStyle = "white";
ctx.font = "10px monospace";

const sampleRate = 44100;
const nyquist = sampleRate / 2;

const labelFreqs = [60, 250, 1000, 4000, 8000, 16000];

for (let f of labelFreqs) {
  const logPos = Math.log10(f / 20) / Math.log10(nyquist / 20);
  const x = logPos * canvas.width;

  ctx.fillText(
    f >= 1000 ? (f / 1000) + "k" : f,
    x,
    canvas.height - 5
  );
}

// ===== BARS LOOP =====
for (let i = 0; i < bars; i++) {

  // log-scaled index
  const logIndex = Math.pow(i / bars, 2);
  const index = Math.min(bufferLength - 1, Math.floor(logIndex * bufferLength));

  let sum = 0;
  let count = 0;

  for (let j = 0; j < 4; j++) {
    if (index + j < bufferLength) {
      sum += dataArray[index + j];
      count++;
    }
  }

  // prevent divide by zero
  let value = count > 0 ? (sum / count) : 0;

  // boost signal
  value = value * 4;

  // visual dB
  let db = 20 * Math.log10(value + 1);
  db = Math.max(0, Math.min(50, db));

  let normalized = db / 50;
  const height = normalized * (canvas.height * 0.8);

  const x = i * barWidth;

  // draw bar
  ctx.fillStyle = `hsl(${i / bars * 360}, 100%, 50%)`;

  ctx.fillRect(
    x,
    baselineY - height,
    barWidth - 2,
    height
  );

  // peak hold
  if (height > peakArray[i]) {
    peakArray[i] = height;
  } else {
    peakArray[i] *= 0.95;
  }

  // peak line
  ctx.fillStyle = "white";
  ctx.fillRect(
    x,
    baselineY - peakArray[i] - 2,
    barWidth - 2,
    3
  );
}
}

// ===== REQUIRED FOR iPHONE =====
document.body.addEventListener("click", start, { once: true });

</script>

</body>
</html>
