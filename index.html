<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spectrum Analyzer</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    canvas {
      display: block;
    }
  </style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ===== MOBILE-SAFE RESIZE =====
function resize() {
  const height = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  canvas.width = window.innerWidth;
  canvas.height = height;
}

resize();
window.addEventListener("resize", resize);

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", resize);
}

// ===== START AUDIO =====
async function start() {

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);

  const analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  analyser.smoothingTimeConstant = 0.8;

  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  // dB range
  const minDb = -80;
  const maxDb = 0;

  function draw() {
    requestAnimationFrame(draw);

    analyser.getByteFrequencyData(dataArray);

    // clear screen
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ===== BASELINE =====
    const baselineY = canvas.height - 25;

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0, baselineY);
    ctx.lineTo(canvas.width, baselineY);
    ctx.stroke();

    // ===== dB SCALE =====
    ctx.fillStyle = "white";
    ctx.font = "12px monospace";

    for (let dbMark = 0; dbMark >= minDb; dbMark -= 20) {
      const normalized = (dbMark - minDb) / (maxDb - minDb);
      const y = baselineY - normalized * (canvas.height * 0.8);

      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(20, y);
      ctx.stroke();

      ctx.fillText(dbMark + " dB", 25, y + 4);
    }

    // ===== BARS =====
    const bars = 32;
    const step = Math.floor(bufferLength / bars);

    for (let i = 0; i < bars; i++) {

      // average bins
      let sum = 0;
      for (let j = 0; j < step; j++) {
        sum += dataArray[i * step + j];
      }

      let value = sum / step;

      // boost weak signal
      value = value * 2;

      // prevent log(0)
      value = Math.max(value, 1);

      // convert to dB
      let db = 20 * Math.log10(value / 255);

      // clamp dB
      db = Math.max(minDb, Math.min(maxDb, db));

      // normalize
      let normalized = (db - minDb) / (maxDb - minDb);
      normalized = Math.max(0, Math.min(1, normalized));

      // height
      const height = normalized * (canvas.height * 0.8);

      // color
      ctx.fillStyle = `hsl(${i / bars * 360}, 100%, 50%)`;

      // draw bar
      ctx.fillRect(
        i * (canvas.width / bars),
        baselineY - height,
        (canvas.width / bars) - 2,
        height
      );
    }
  }

  draw();
}

// required for iPhone
document.body.addEventListener("click", start, { once: true });

</script>

</body>
</html>
